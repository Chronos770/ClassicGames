# widget-apk: builds the Castle & Cards weather Android widget on every
# push that touches `android-widget/**`, then commits the APK to `public/` so it
# ships with the next Vercel deploy. The in-app install button (Weather
# → Station tab) links to a same-origin URL — no GitHub login, no 404
# surprises, no separate release flow:
#
#   https://castleandcards.com/weather-widget.apk
#
# Debug-signed because that's all this project needs for sideloading.
# Phones will warn "install from unknown sources" the first time.

name: widget-apk

on:
  push:
    branches: [master]
    paths:
      - 'android-widget/**'
      - '.github/workflows/widget-apk.yml'
  workflow_dispatch:

concurrency:
  group: widget-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + write token so the post-build commit can push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The committed project intentionally omits the gradle wrapper jar
      # (Android Studio adds it locally). Generate one with the version
      # AGP 8.5.2 + Kotlin 1.9.24 expect.
      - name: Generate wrapper
        working-directory: android-widget
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android-widget
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APK into public/
        run: |
          mkdir -p public
          cp android-widget/app/build/outputs/apk/debug/app-debug.apk public/weather-widget.apk

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/weather-widget.apk
          if git diff --cached --quiet; then
            echo "APK unchanged — nothing to commit."
            exit 0
          fi
          # [skip ci] keeps the resulting commit from re-triggering this
          # workflow (paths filter wouldn't match anyway, but belt + braces).
          git commit -m "ci: rebuild weather widget APK [skip ci]

Auto-built from ${GITHUB_SHA::7}."
          git push origin HEAD:master

      - name: Upload artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: weather-widget-apk
          path: public/weather-widget.apk
          if-no-files-found: error
