# android-apks: builds both Castle & Cards Android artifacts on every
# push that touches `android-widget/**`, then commits both APKs to
# `public/` so they ship with the next Vercel deploy. The in-app install
# buttons (Weather → Station tab) link to same-origin URLs — no GitHub
# login, no 404 surprises, no separate release flow:
#
#   https://castleandcards.com/castle-and-cards.apk   (full site, WebView)
#   https://castleandcards.com/weather-widget.apk     (home-screen widget)
#
# Debug-signed because that's all this project needs for sideloading.
# Phones will warn "install from unknown sources" the first time.

name: widget-apk

on:
  push:
    branches: [master]
    paths:
      - 'android-widget/**'
      - '.github/workflows/widget-apk.yml'
  workflow_dispatch:

concurrency:
  group: widget-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The committed project intentionally omits the gradle wrapper jar
      # (Android Studio adds it locally). Generate one with the version
      # AGP 8.5.2 + Kotlin 1.9.24 expect.
      - name: Generate wrapper
        working-directory: android-widget
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APKs
        working-directory: android-widget
        run: ./gradlew :app:assembleDebug :fullapp:assembleDebug --no-daemon --stacktrace

      - name: Stage APKs into public/
        run: |
          mkdir -p public
          cp android-widget/app/build/outputs/apk/debug/app-debug.apk public/weather-widget.apk
          cp android-widget/fullapp/build/outputs/apk/debug/fullapp-debug.apk public/castle-and-cards.apk

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/weather-widget.apk public/castle-and-cards.apk
          if git diff --cached --quiet; then
            echo "APKs unchanged — nothing to commit."
            exit 0
          fi
          # [skip ci] keeps the resulting commit from re-triggering this
          # workflow (paths filter wouldn't match anyway, but belt + braces).
          git commit -m "ci: rebuild Castle & Cards APKs from ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:master

      - name: Upload artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: castle-and-cards-apks
          path: |
            public/weather-widget.apk
            public/castle-and-cards.apk
          if-no-files-found: error
