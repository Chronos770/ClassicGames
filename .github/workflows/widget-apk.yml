# android-apks: builds all three Castle & Cards Android artifacts on
# every push that touches the relevant code, then commits the APKs to
# `public/` so they ship with the next Vercel deploy. The in-app
# install buttons (Weather → Station tab) link to same-origin URLs:
#
#   https://castleandcards.com/castle-and-cards.apk   (full native app, Capacitor)
#   https://castleandcards.com/weather-app.apk        (weather-only native app)
#   https://castleandcards.com/weather-widget.apk     (home-screen widget, Glance)
#
# Debug-signed because that's all this project needs for sideloading.
# Phones will warn "install from unknown sources" the first time.

name: android-apks

on:
  push:
    branches: [master]
    paths:
      - 'android-widget/**'
      - 'android-app/**'
      - 'android-weather/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'public/sw.js'
      - 'public/manifest.json'
      - 'public/manifest-weather.json'
      - 'public/icons/**'
      - 'public/games/**'
      - 'vite.config.ts'
      - '.github/workflows/widget-apk.yml'
  workflow_dispatch:

concurrency:
  group: widget-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Capacitor 8 modules target Java 21 source level. Keep JDK 21
      # in sync with the source compat set by capacitor.build.gradle.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: npm ci
        run: npm ci

      - name: Build web app (Vite)
        run: npm run build

      - name: Capacitor sync (copy dist into android-app)
        run: npx cap sync android

      # The weather app reuses the same web bundle and Capacitor config
      # but a different Android project (different applicationId, icons,
      # MainActivity that routes to /weather?pwa=weather). Mirror the
      # synced web assets + plugin config into it so the build sees the
      # latest dist without us needing a second capacitor.config.ts.
      - name: Mirror Capacitor assets into android-weather
        run: |
          set -euo pipefail
          mkdir -p android-weather/app/src/main/assets
          rm -rf android-weather/app/src/main/assets/public
          cp -r android-app/app/src/main/assets/public android-weather/app/src/main/assets/public
          cp android-app/app/src/main/assets/capacitor.config.json android-weather/app/src/main/assets/capacitor.config.json
          cp android-app/app/src/main/assets/capacitor.plugins.json android-weather/app/src/main/assets/capacitor.plugins.json
          # Capacitor stamps the cordova plugin shim too; reuse it.
          rm -rf android-weather/capacitor-cordova-android-plugins
          cp -r android-app/capacitor-cordova-android-plugins android-weather/capacitor-cordova-android-plugins
          # Re-derive the capacitor settings file pointing at the local copy.
          cp android-app/capacitor.settings.gradle android-weather/capacitor.settings.gradle
          cp android-app/capacitor.build.gradle android-weather/capacitor.build.gradle 2>/dev/null || true
          cp android-app/app/capacitor.build.gradle android-weather/app/capacitor.build.gradle

      # Rasterize the weather launcher icon from the SVG so older
      # Android versions (API 24-25, which use the PNG fallback rather
      # than the adaptive vector) and many launchers that prefer PNG
      # see the cloud + lightning bolt instead of the default
      # Capacitor "C" logo. ImageMagick is preinstalled on ubuntu-latest.
      - name: Rasterize weather launcher icons
        run: |
          set -euo pipefail
          SRC=public/icons/weather-icon-512.svg
          OUT=android-weather/app/src/main/res
          declare -A SIZES=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          # Foreground sizes for adaptive icon legacy PNG fallback:
          # the foreground layer is 108dp at design density (so square
          # PNG sized like ic_launcher but rendered from the same SVG).
          for dir in "${!SIZES[@]}"; do
            sz="${SIZES[$dir]}"
            mkdir -p "$OUT/$dir"
            magick -background none "$SRC" -resize "${sz}x${sz}" "$OUT/$dir/ic_launcher.png"
            magick -background none "$SRC" -resize "${sz}x${sz}" "$OUT/$dir/ic_launcher_round.png"
            # Foreground: render bigger then center so adaptive launchers
            # that punch a circle still see the cloud + bolt.
            fg=$(( sz * 108 / 48 ))
            magick -background none "$SRC" -resize "${fg}x${fg}" "$OUT/$dir/ic_launcher_foreground.png"
          done

      - name: Build full-app debug APK (Capacitor)
        working-directory: android-app
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # The weather APK now bundles the Glance home-screen widget too,
      # so there's no separate android-widget build — that project is
      # kept around for development of the widget in isolation.
      - name: Build weather-app debug APK (Capacitor + widget)
        working-directory: android-weather
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APKs into public/
        run: |
          mkdir -p public
          cp android-app/app/build/outputs/apk/debug/app-debug.apk public/castle-and-cards.apk
          cp android-weather/app/build/outputs/apk/debug/app-debug.apk public/weather-app.apk
          # The standalone weather-widget.apk is no longer published —
          # the widget ships inside weather-app.apk. Remove the stale
          # file if a previous build left one behind.
          rm -f public/weather-widget.apk
          ls -la public/*.apk

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/castle-and-cards.apk public/weather-app.apk
          # Remove the stale standalone widget APK from public/ if present.
          if [ -f public/weather-widget.apk ]; then
            git rm public/weather-widget.apk || true
          else
            git rm public/weather-widget.apk 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "APKs unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "ci: rebuild Castle & Cards APKs from ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:master

      - name: Upload artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: castle-and-cards-apks
          path: |
            public/castle-and-cards.apk
            public/weather-app.apk
          if-no-files-found: error
