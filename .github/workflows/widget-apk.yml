# android-apks: builds both Castle & Cards Android artifacts on every
# push that touches the relevant code, then commits both APKs to
# `public/` so they ship with the next Vercel deploy. The in-app
# install buttons (Weather → Station tab) link to same-origin URLs:
#
#   https://castleandcards.com/castle-and-cards.apk   (full native app, Capacitor)
#   https://castleandcards.com/weather-widget.apk     (home-screen widget, Glance)
#
# Debug-signed because that's all this project needs for sideloading.
# Phones will warn "install from unknown sources" the first time.

name: android-apks

on:
  push:
    branches: [master]
    paths:
      - 'android-widget/**'
      - 'android-app/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'public/sw.js'
      - 'public/manifest.json'
      - 'public/icons/**'
      - 'public/games/**'
      - 'vite.config.ts'
      - '.github/workflows/widget-apk.yml'
  workflow_dispatch:

concurrency:
  group: widget-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: npm ci
        run: npm ci

      - name: Build web app (Vite)
        run: npm run build

      - name: Capacitor sync (copy dist into android-app)
        run: npx cap sync android

      # The widget's Gradle project intentionally omits the wrapper jar
      # (Android Studio adds it locally). Generate one with the version
      # AGP 8.5.2 + Kotlin 1.9.24 expect.
      - name: Generate widget gradle wrapper
        working-directory: android-widget
        run: gradle wrapper --gradle-version 8.7

      - name: Build widget debug APK
        working-directory: android-widget
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # Capacitor ships its own gradle wrapper, just use it.
      - name: Build full-app debug APK (Capacitor)
        working-directory: android-app
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APKs into public/
        run: |
          mkdir -p public
          cp android-widget/app/build/outputs/apk/debug/app-debug.apk public/weather-widget.apk
          cp android-app/app/build/outputs/apk/debug/app-debug.apk public/castle-and-cards.apk
          ls -la public/*.apk

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/weather-widget.apk public/castle-and-cards.apk
          if git diff --cached --quiet; then
            echo "APKs unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "ci: rebuild Castle & Cards APKs from ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:master

      - name: Upload artifacts (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: castle-and-cards-apks
          path: |
            public/weather-widget.apk
            public/castle-and-cards.apk
          if-no-files-found: error
