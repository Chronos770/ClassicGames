<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(0,32)" filter="url(#shadow)">
    <!-- Cloud body -->
    <path d="M352,229c0-51-40-91-91-91c-40,0-75,24-86,59c-9-3-18-4-27-4c-35,0-64,29-64,64c0,35,29,64,64,64h197c37,0,69-29,69-69C414,259,387,232,352,229z"
          fill="url(#cloud)" stroke="#bae6fd" stroke-width="5"/>
    <!-- Lightning bolt -->
    <path d="M256,288 L213,373 L250,373 L229,448 L309,341 L267,341 L288,288 Z"
          fill="url(#bolt)" stroke="#b45309" stroke-width="4" stroke-linejoin="round"/>
  </g>
</svg>
